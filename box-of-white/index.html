    <section class="origin" aria-label="Poem">
      <div class="container">
        <figure class="origin__poem">
          <blockquote class="origin__verse">
            <p>I once lived in a box of white,<br>
            White walls, white floor,<br>
            No beginning, no end.</p>

            <p>Right when I was assured I would perish,<br>
            I found somebody I could cherish.<br>
            She was my chainsaw that cut me to freedom,<br>
            From my dome,<br>
            In my jail home,<br>
            My laugh was no longer hollow<br>
            for once<br>
            I spoke without limits<br>
            for once,<br>
            I didn&rsquo;t feel like the world was a prison.</p>

            <p>Now I could love and feel,<br>
            For I had a friendship that was forever sealed.<br>
            My broken heart was finally mended,<br>
            By somebody I least expected.<br>
            Now I was protected,<br>
            By a blanket of warmth from a heart.</p>

            <p>She carried me like a mother bat,<br>
            As I clung onto her chest.<br>
            But one day she saw a mango of opportunity,<br>
            She dove just like the rest.<br>
            She let me freefall from the heavens<br>
            And I landed back in my cage.</p>

            <p>My eyes burned fire,<br>
            My heart held such desire.<br>
            Sour words spilled forth,<br>
            And melted into darkness like a half eaten ice cream cone.<br>
            I wept rivers of tears longing for freedom,<br>
            My heart sliced in half.</p>

            <p>Only till my floors were soaked with the salt,<br>
            And my eyes held no shine,<br>
            And my head bowed in grief,<br>
            And I didn&rsquo;t feel any pain<br>
            When I became just an empty shell<br>
            Was when I was finally freed.</p>
          </blockquote>
          <figcaption class="origin__caption">
            <span class="origin__title">Box of White</span>
            <span class="origin__byline">&mdash; Sienna Wong, age 8</span>
          </figcaption>
        </figure>
      </div>
    </section>
  </main>
